```yaml
global:
  scrape_interval: 15s
  evaluation_interval: 15s


rule_files:
  - "alerts.yml"


alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"



scrape_configs:


  - job_name: "springboot-app"

    metrics_path: "/actuator/prometheus"

    scrape_interval: 15s

    static_configs:
      - targets:
          - "app:8080"
```
